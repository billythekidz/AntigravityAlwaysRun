name: Release with Provenance

on:
  push:
    tags:
      - 'always-run-v*'

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  attest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Compile
        run: npm run compile

      - name: Package VSIX
        run: npx -y vsce package --no-git-tag-version --no-dependencies

      - name: Get VSIX filename
        id: vsix
        run: |
          VSIX_FILE=$(ls *.vsix)
          echo "file=$VSIX_FILE" >> $GITHUB_OUTPUT
          echo "Found: $VSIX_FILE"

      - name: Compute SHA-256
        id: hash
        run: |
          SHA=$(sha256sum ${{ steps.vsix.outputs.file }} | cut -d ' ' -f 1)
          echo "sha256=$SHA" >> $GITHUB_OUTPUT
          echo "SHA-256: $SHA"

      - name: Generate SLSA Provenance Attestation
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: ${{ steps.vsix.outputs.file }}

      - name: Upload VSIX to Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.ref_name }}" "${{ steps.vsix.outputs.file }}" --clobber || true

      - name: Update Release Notes with Attestation
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          EXISTING_NOTES=$(gh release view "${{ github.ref_name }}" --json body -q .body || echo "")
          ATTESTATION_NOTE="

          ---
          **🔐 Supply Chain Security**

          This release includes [SLSA Provenance Attestation](https://slsa.dev/) verifying the VSIX was built from this exact commit.

          Verify: \`gh attestation verify ${{ steps.vsix.outputs.file }} --repo ${{ github.repository }}\`
          "
          echo "${EXISTING_NOTES}${ATTESTATION_NOTE}" | gh release edit "${{ github.ref_name }}" --notes-file -
